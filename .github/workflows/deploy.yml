name: Deploy to GAS

run-name: Deploy to GAS (${{ github.ref_name }})

on:
  # Déploiement officiel lors de la publication d'une release
  release:
    types: [published]
  # Déploiement continu sur la branche de dev, uniquement si le code GAS change
  push:
    branches: [dev]
    paths:
      - 'gas/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        # Secret du repo : contenu JSON de ~/.clasprc.json (jeton OAuth clasp)
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push to Google Apps Script
        run: clasp push --force

      - name: Deploy new version
        # Variable du repo : ID du déploiement Web App à mettre à jour
        run: clasp deploy --deploymentId "${{ vars.DEPLOY_ID }}" --description "${{ github.ref_name }}"
