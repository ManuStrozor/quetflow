<style>
  :root {
    --bg:        #f4f5fb;
    --surface:   #ffffff;
    --ink:       #1f2233;
    --muted:     #6b7088;
    --primary:   #5b4bd6;
    --primary-d: #4536b0;
    --accent:    #16b8a6;
    --border:    #e7e8f0;
    --shadow:    0 1px 3px rgba(28, 30, 60, .08), 0 6px 20px rgba(28, 30, 60, .05);
    --radius:    14px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.45;
  }

  /* En-tête */
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 18px 24px;
    background: linear-gradient(110deg, var(--primary), var(--primary-d));
    color: #fff;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .logo { font-size: 32px; line-height: 1; }
  .brand h1 { margin: 0; font-size: 22px; letter-spacing: .3px; }
  .tagline { margin: 2px 0 0; font-size: 13px; opacity: .85; }
  .ss-link {
    color: #fff; text-decoration: none; font-size: 14px; font-weight: 600;
    background: rgba(255,255,255,.16); padding: 8px 14px; border-radius: 999px;
    transition: background .15s;
  }
  .ss-link:hover { background: rgba(255,255,255,.28); }

  /* Mise en page */
  .container { max-width: 1080px; margin: 0 auto; padding: 24px; display: grid; gap: 20px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px;
  }
  .card h2, .card h3 { margin: 0 0 14px; font-size: 16px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .card-head h3 { margin: 0; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 760px) { .grid-2 { grid-template-columns: 1fr; } }

  /* Import */
  .dropzone {
    border: 2px dashed #c7c9dd; border-radius: 12px; padding: 28px;
    text-align: center; cursor: pointer; color: var(--muted);
    transition: border-color .15s, background .15s;
  }
  .dropzone:hover, .dropzone:focus, .dropzone.drag {
    border-color: var(--primary); background: #f6f5ff; outline: none;
  }
  .dropzone p { margin: 4px 0; }
  .dropzone .hint { font-size: 12.5px; }

  /* KPIs */
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  @media (max-width: 760px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
  .kpi { display: flex; flex-direction: column; gap: 6px; }
  .kpi-label { font-size: 13px; color: var(--muted); }
  .kpi-value { font-size: 26px; font-weight: 700; color: var(--primary-d); }

  /* Graphiques */
  .chart-wrap { position: relative; height: 260px; }
  .chart-wrap.tall { height: 320px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .data-table th, .data-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .data-table th { color: var(--muted); font-weight: 600; font-size: 12.5px; text-transform: uppercase; letter-spacing: .4px; }
  .data-table td.num, .data-table th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table .empty { text-align: center; color: var(--muted); padding: 24px; }

  /* Boutons */
  .btn-ghost {
    border: 1px solid var(--border); background: #fff; color: var(--muted);
    padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .btn-ghost:hover { color: #c0392b; border-color: #e3b7b1; background: #fdf3f1; }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 10px;
    font-size: 14px; box-shadow: var(--shadow); z-index: 50; max-width: 90%;
  }
  .toast.err { background: #c0392b; }

  /* Loader */
  .loader {
    position: fixed; inset: 0; background: rgba(244,245,251,.6);
    display: flex; align-items: center; justify-content: center; z-index: 60;
  }
  /* L'attribut [hidden] ne suffit pas : .loader impose display:flex. On le rétablit. */
  .loader[hidden] { display: none; }
  .spinner {
    width: 38px; height: 38px; border: 4px solid #d9daea; border-top-color: var(--primary);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
