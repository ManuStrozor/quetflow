<style>
  :root {
    --bg:        #f4f5fb;
    --surface:   #ffffff;
    --ink:       #1f2233;
    --muted:     #6b7088;
    --primary:   #5b4bd6;
    --primary-d: #4536b0;
    --accent:    #16b8a6;
    --border:    #e7e8f0;
    --shadow:    0 1px 3px rgba(28, 30, 60, .08), 0 6px 20px rgba(28, 30, 60, .05);
    --radius:    14px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.45;
  }

  /* En-tête */
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 18px 24px;
    background: linear-gradient(110deg, var(--primary), var(--primary-d));
    color: #fff;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .logo { font-size: 32px; line-height: 1; }
  .brand h1 { margin: 0; font-size: 22px; letter-spacing: .3px; }
  .tagline { margin: 2px 0 0; font-size: 13px; opacity: .85; }
  .ss-link {
    color: #fff; text-decoration: none; font-size: 14px; font-weight: 600;
    background: rgba(255,255,255,.16); padding: 8px 14px; border-radius: 999px;
    transition: background .15s;
  }
  .ss-link:hover { background: rgba(255,255,255,.28); }

  /* Mise en page */
  /* minmax(0, 1fr) (et non 1fr/auto) : autorise les colonnes à rétrécir sous la
     largeur de leur contenu — sinon les grands tableaux et les canvas débordent
     en largeur sur mobile (min-width auto des items de grille). */
  .container {
    max-width: 1080px; width: 100%; margin: 0 auto; padding: 24px;
    display: grid; grid-template-columns: minmax(0, 1fr); gap: 20px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px;
    min-width: 0;
  }
  .card h2, .card h3 { margin: 0 0 14px; font-size: 16px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .card-head h3 { margin: 0; }
  .grid-2 { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 20px; }
  @media (max-width: 760px) { .grid-2 { grid-template-columns: minmax(0, 1fr); } }

  /* Filtres */
  .filters { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; padding: 14px 20px; }
  .filter-group { display: flex; align-items: center; gap: 10px; }
  .filter-label { font-size: 13px; font-weight: 600; color: var(--muted); }
  .seg { display: inline-flex; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
  .seg-btn {
    border: 0; background: transparent; color: var(--muted); cursor: pointer;
    padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; transition: background .15s, color .15s;
  }
  .seg-btn:hover { color: var(--ink); }
  .seg-btn.is-active { background: var(--primary); color: #fff; box-shadow: 0 1px 2px rgba(28,30,60,.18); }
  .muted-note { font-weight: 400; font-size: 13px; color: var(--muted); }

  /* Import */
  .dropzone {
    border: 2px dashed #c7c9dd; border-radius: 12px; padding: 28px;
    text-align: center; cursor: pointer; color: var(--muted);
    transition: border-color .15s, background .15s;
  }
  .dropzone:hover, .dropzone:focus, .dropzone.drag {
    border-color: var(--primary); background: #f6f5ff; outline: none;
  }
  .dropzone p { margin: 4px 0; }
  .dropzone .hint { font-size: 12.5px; }

  /* KPIs */
  .kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 20px; }
  @media (max-width: 760px) { .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  .kpi { display: flex; flex-direction: column; gap: 6px; }
  .kpi-label { font-size: 13px; color: var(--muted); }
  .kpi-value { font-size: 26px; font-weight: 700; color: var(--primary-d); }

  /* Graphiques */
  .chart-wrap { position: relative; height: 260px; }
  .chart-wrap.tall { height: 320px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .data-table th, .data-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .data-table th { color: var(--muted); font-weight: 600; font-size: 12.5px; text-transform: uppercase; letter-spacing: .4px; }
  .data-table td.num, .data-table th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table .empty { text-align: center; color: var(--muted); padding: 24px; }
  .data-table td.strong, .data-table th.strong { font-weight: 700; color: var(--ink); }
  .data-table .row-total td, .data-table .row-total th {
    border-top: 2px solid var(--border); font-weight: 700; color: var(--ink); background: #fafaff;
  }

  /* Tableau croisé (Quêtes) */
  .cross-table th.row-head { text-align: left; color: var(--ink); font-weight: 600; text-transform: none; letter-spacing: 0; }
  .cross-table thead th:first-child { white-space: nowrap; }
  .cross-table td.num { color: var(--ink); }

  /* Boutons */
  .btn-ghost {
    border: 1px solid var(--border); background: #fff; color: var(--muted);
    padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .btn-ghost:hover { color: #c0392b; border-color: #e3b7b1; background: #fdf3f1; }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 10px;
    font-size: 14px; box-shadow: var(--shadow); z-index: 50; max-width: 90%;
  }
  .toast.err { background: #c0392b; }

  /* Barre de progression (en haut de l'app) */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 6px;
    z-index: 100; pointer-events: none; background: rgba(91, 75, 214, .1);
  }
  .topbar-fill {
    display: block; height: 100%; width: 0;
    background: linear-gradient(90deg, var(--accent), var(--primary));
    box-shadow: 0 0 12px rgba(91, 75, 214, .85), 0 1px 4px rgba(91, 75, 214, .6);
    transition: width .2s ease, opacity .25s ease;
  }

  /* Loader central (overlay plein écran) */
  .loader {
    position: fixed; inset: 0; background: rgba(244, 245, 251, .6);
    display: flex; align-items: center; justify-content: center; z-index: 60;
  }
  /* L'attribut [hidden] ne suffit pas : .loader impose display:flex. On le rétablit. */
  .loader[hidden] { display: none; }
  .spinner {
    width: 38px; height: 38px; border: 4px solid #d9daea; border-top-color: var(--primary);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile : resserre les marges et l'en-tête pour éviter tout débordement */
  @media (max-width: 560px) {
    .app-header { padding: 14px 16px; gap: 10px; }
    .brand { gap: 10px; min-width: 0; }
    .brand .logo { font-size: 26px; }
    .brand h1 { font-size: 19px; }
    .tagline { font-size: 12px; }
    .dropzone .hint { display: none; }
    .ss-link { flex: none; padding: 7px 12px; font-size: 13px; white-space: nowrap; }
    .container { padding: 16px; gap: 16px; }
    .card { padding: 16px; }
    .kpis { gap: 12px; }
    .kpi-value { font-size: 22px; }
  }
</style>
