<script>
  const fmtEur = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
  const fmtEur2 = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' });
  const fmtEurFlex = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 0, maximumFractionDigits: 2 });
  const fmtInt = new Intl.NumberFormat('fr-FR');
  const PALETTE = ['#5b4bd6', '#16b8a6', '#f5a524', '#ef5da8', '#3aa0ff', '#9b8cff', '#27c498', '#ff7a59'];
  const charts = {};

  // Données brutes renvoyées par le serveur + état des filtres.
  let ALL_ROWS = [];
  const filters = { jour: 'all', moment: 'all' };

  /* ----- Démarrage ----- */
  document.addEventListener('DOMContentLoaded', function () {
    initImport();
    initFilters();
    document.getElementById('resetBtn').addEventListener('click', onReset);
    progressStart();
    google.script.run
      .withSuccessHandler(function (url) { document.getElementById('ssLink').href = url; progressDone(); })
      .withFailureHandler(progressDone)
      .getStorageUrl();
    refresh();
  });

  /* ----- Import ----- */
  function initImport() {
    const zone = document.getElementById('dropzone');
    const input = document.getElementById('fileInput');

    zone.addEventListener('click', function () { input.click(); });
    zone.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); input.click(); }
    });
    input.addEventListener('change', function () { if (input.files[0]) handleFile(input.files[0]); input.value = ''; });

    ['dragenter', 'dragover'].forEach(function (ev) {
      zone.addEventListener(ev, function (e) { e.preventDefault(); zone.classList.add('drag'); });
    });
    ['dragleave', 'drop'].forEach(function (ev) {
      zone.addEventListener(ev, function (e) { e.preventDefault(); zone.classList.remove('drag'); });
    });
    zone.addEventListener('drop', function (e) {
      const f = e.dataTransfer.files[0];
      if (f) handleFile(f);
    });
  }

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = function (e) {
      progressStart();
      google.script.run
        .withSuccessHandler(function (res) {
          progressDone();
          let m = res.imported + ' ligne(s) importée(s)';
          if (res.duplicates) m += ' · ' + res.duplicates + ' doublon(s)';
          if (res.skipped) m += ' · ' + res.skipped + ' ignorée(s)';
          m += ' · total : ' + res.total;
          toast('✅ ' + m);
          refresh();
        })
        .withFailureHandler(function (err) { progressDone(); toast('⚠️ ' + err.message, true); })
        .importCsv(e.target.result);
    };
    reader.onerror = function () { toast('⚠️ Lecture du fichier impossible.', true); };
    reader.readAsText(file);
  }

  /* ----- Filtres (segmented controls) ----- */
  function initFilters() {
    document.querySelectorAll('#filters .seg').forEach(function (seg) {
      const key = seg.dataset.filter;
      seg.addEventListener('click', function (e) {
        const btn = e.target.closest('.seg-btn');
        if (!btn) return;
        filters[key] = btn.dataset.value;
        seg.querySelectorAll('.seg-btn').forEach(function (b) { b.classList.toggle('is-active', b === btn); });
        render();
      });
    });
  }

  /* ----- Chargement des données ----- */
  function refresh() {
    progressStart();
    google.script.run
      .withSuccessHandler(function (data) {
        ALL_ROWS = hydrate((data && data.rows) || []);
        render();
        progressDone();
      })
      .withFailureHandler(function (err) { progressDone(); toast('⚠️ ' + err.message, true); })
      .getRows();
  }

  // Réhydrate l'encodage positionnel renvoyé par getRows() (cf. ordre des colonnes
  // documenté côté serveur). Une seule allocation par ligne, boucle indexée (rapide).
  function hydrate(rows) {
    const out = new Array(rows.length);
    for (let i = 0; i < rows.length; i++) {
      const a = rows[i];
      out[i] = { net: a[0], brut: a[1], projet: a[2], location: a[3],
                 celebration: a[4], mois: a[5], dim: a[6], matin: a[7] };
    }
    return out;
  }

  /* ----- Rendu global ----- */
  // Tout est dérivé d'UNE SEULE passe sur ALL_ROWS (aggregate), au lieu de
  // re-filtrer et re-boucler dans chaque renderXxx : essentiel sur gros volumes.
  function render() {
    const agg = aggregate();
    renderKpis(agg);
    renderMonthChart(agg);
    renderBrutChart(agg);
    renderBornes(agg);
    renderQuetes(agg);
  }

  /**
   * Agrège ALL_ROWS en une passe pour tous les blocs du tableau de bord.
   * - Filtre « jour » : appliqué d'abord ; alimente les Bornes (qui ventilent
   *   elles-mêmes matin/soir, donc indépendantes du filtre « moment »).
   * - Filtre « moment » : appliqué ensuite ; alimente KPIs, graphiques et Quêtes.
   */
  function aggregate() {
    const jour = filters.jour, moment = filters.moment;
    let total = 0, totalBrut = 0, count = 0;
    const bornesSet = {};            // projets distincts (KPI Bornes actives)
    const mois = {};                 // mois -> net
    const brut = {};                 // valeur brute -> nb de transactions
    const bornes = {};               // projet -> { count, matin, soir, total }
    const quetes = {};               // celeb -> { lieu -> net }
    const celebs = {}, locs = {};

    const rows = ALL_ROWS;
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      if (jour !== 'all' && (jour === 'dim' ? !r.dim : r.dim)) continue;

      // Bornes : filtre « jour » seul, ventilation matin/soir interne.
      if (r.projet) {
        const b = bornes[r.projet] || (bornes[r.projet] = { count: 0, matin: 0, soir: 0, total: 0 });
        b.count++; b.total += r.net;
        if (r.matin) b.matin += r.net; else b.soir += r.net;
      }

      if (moment !== 'all' && (moment === 'matin' ? !r.matin : r.matin)) continue;

      // KPIs
      total += r.net; totalBrut += r.brut; count++;
      if (r.projet) bornesSet[r.projet] = true;
      // Évolution mensuelle
      if (r.mois) mois[r.mois] = (mois[r.mois] || 0) + r.net;
      // Répartition des montants brut
      if (r.brut) brut[r.brut] = (brut[r.brut] || 0) + 1;
      // Quêtes : Célébration × Lieu (Location non vide)
      const l = r.location ? String(r.location).trim() : '';
      if (l) {
        const c = r.celebration || '—';
        celebs[c] = true; locs[l] = true;
        const cc = quetes[c] || (quetes[c] = {});
        cc[l] = (cc[l] || 0) + r.net;
      }
    }

    return { total: total, totalBrut: totalBrut, count: count,
             bornesCount: Object.keys(bornesSet).length,
             mois: mois, brut: brut, bornes: bornes,
             quetes: quetes, celebs: celebs, locs: locs };
  }

  function renderKpis(a) {
    document.getElementById('kpiTotal').textContent = fmtEur.format(a.total);
    document.getElementById('kpiCount').textContent = fmtInt.format(a.count);
    document.getElementById('kpiAvg').textContent = fmtEur2.format(a.count ? a.totalBrut / a.count : 0);   // moyenne sur le brut
    document.getElementById('kpiBornes').textContent = fmtInt.format(a.bornesCount);
  }

  /* ----- Évolution mensuelle ----- */
  function renderMonthChart(a) {
    const labels = Object.keys(a.mois).sort();
    lineChart('chartMonth', labels.map(formatMonth), labels.map(function (k) { return a.mois[k]; }));
  }

  /* ----- Répartition des montants brut (nb de transactions par valeur) ----- */
  function renderBrutChart(a) {
    const vals = Object.keys(a.brut).map(Number).sort(function (x, y) { return x - y; });
    barChart('chartBrut', vals.map(function (v) { return fmtEurFlex.format(v); }),
                          vals.map(function (v) { return a.brut[v]; }));
  }

  /* ----- Bornes (par Project Name, ventilation matin/soir) ----- */
  function renderBornes(a) {
    const list = Object.keys(a.bornes).map(function (k) { return Object.assign({ projet: k }, a.bornes[k]); })
      .sort(function (x, y) { return y.total - x.total; });

    const body = document.getElementById('bornesBody');
    if (!list.length) {
      body.innerHTML = '<tr><td colspan="5" class="empty">Aucune borne pour ce filtre.</td></tr>';
      return;
    }
    let html = list.map(function (b) {
      return '<tr><td>' + esc(b.projet) + '</td><td class="num">' + fmtInt.format(b.count) +
        '</td><td class="num">' + fmtEur2.format(b.matin) + '</td><td class="num">' + fmtEur2.format(b.soir) +
        '</td><td class="num strong">' + fmtEur2.format(b.total) + '</td></tr>';
    }).join('');
    const tot = list.reduce(function (a, b) {
      a.count += b.count; a.matin += b.matin; a.soir += b.soir; a.total += b.total; return a;
    }, { count: 0, matin: 0, soir: 0, total: 0 });
    html += '<tr class="row-total"><td>Total</td><td class="num">' + fmtInt.format(tot.count) +
      '</td><td class="num">' + fmtEur2.format(tot.matin) + '</td><td class="num">' + fmtEur2.format(tot.soir) +
      '</td><td class="num strong">' + fmtEur2.format(tot.total) + '</td></tr>';
    body.innerHTML = html;
  }

  /* ----- Quêtes : tableau croisé Célébration × Lieu (total net) ----- */
  function renderQuetes(a) {
    const cells = a.quetes;                       // cells[celebration][location] = net
    const celebList = Object.keys(a.celebs).sort();
    const locList = Object.keys(a.locs).sort();

    const table = document.getElementById('quetesTable');
    const head = table.querySelector('thead');
    const body = document.getElementById('quetesBody');

    if (!celebList.length || !locList.length) {
      head.innerHTML = '<tr><th>Célébration ＼ Lieu</th></tr>';
      body.innerHTML = '<tr><td class="empty">Aucune quête pour ce filtre.</td></tr>';
      return;
    }

    head.innerHTML = '<tr><th>Célébration ＼ Lieu</th>' +
      locList.map(function (l) { return '<th class="num">' + esc(l) + '</th>'; }).join('') +
      '<th class="num strong">Total</th></tr>';

    const colTot = {};
    let grand = 0;
    const rowsHtml = celebList.map(function (c) {
      let rowTot = 0;
      const tds = locList.map(function (l) {
        const v = (cells[c] && cells[c][l]) || 0;
        rowTot += v; colTot[l] = (colTot[l] || 0) + v;
        return '<td class="num">' + (v ? fmtEur2.format(v) : '·') + '</td>';
      }).join('');
      grand += rowTot;
      return '<tr><th class="row-head">' + esc(c) + '</th>' + tds +
        '<td class="num strong">' + fmtEur2.format(rowTot) + '</td></tr>';
    }).join('');

    const totalRow = '<tr class="row-total"><th class="row-head">Total</th>' +
      locList.map(function (l) { return '<td class="num">' + fmtEur2.format(colTot[l] || 0) + '</td>'; }).join('') +
      '<td class="num strong">' + fmtEur2.format(grand) + '</td></tr>';

    body.innerHTML = rowsHtml + totalRow;
  }

  /* ----- Graphiques (Chart.js) ----- */
  // Mise à jour en place : on ne recrée pas le graphique à chaque filtre (coûteux),
  // on remplace seulement ses données. 'none' = pas d'animation → rendu instantané.
  function updateChart(id, labels, values) {
    const c = charts[id];
    c.data.labels = labels;
    c.data.datasets[0].data = values;
    c.update('none');
  }

  function lineChart(id, labels, values) {
    if (charts[id]) return updateChart(id, labels, values);
    charts[id] = new Chart(byId(id), {
      type: 'line',
      data: { labels: labels, datasets: [{ data: values, borderColor: PALETTE[0],
        backgroundColor: 'rgba(91,75,214,.12)', fill: true, tension: .3, pointRadius: 3 }] },
      options: baseOpts(false, true)
    });
  }

  // Histogramme : axe Y = nombre de transactions (pas des euros), axe X = montants.
  function barChart(id, labels, values) {
    if (charts[id]) return updateChart(id, labels, values);
    charts[id] = new Chart(byId(id), {
      type: 'bar',
      data: { labels: labels, datasets: [{ data: values, backgroundColor: PALETTE[0],
        borderRadius: 6, maxBarThickness: 48 }] },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: function (c) {
            const n = c.parsed.y;
            return ' ' + fmtInt.format(n) + ' transaction' + (n > 1 ? 's' : '');
          } } }
        },
        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
      }
    });
  }

  function baseOpts(showLegend, eurAxis) {
    const opts = {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: {
        legend: { display: showLegend, position: 'bottom' },
        tooltip: { callbacks: { label: function (c) {
          const v = c.parsed.y != null ? c.parsed.y : (c.parsed.x != null ? c.parsed.x : c.parsed);
          return ' ' + fmtEur2.format(v);
        } } }
      }
    };
    if (eurAxis) {
      // Seul l'axe des valeurs (y) est en euros ; l'axe x reste catégoriel (les mois).
      opts.scales = { y: { ticks: { callback: tickEur } } };
    }
    return opts;
  }
  function tickEur(v) { return (typeof v === 'number') ? fmtEur.format(v) : v; }

  /* ----- Effacer ----- */
  function onReset() {
    if (!confirm('Effacer toutes les données importées ? Cette action est irréversible.')) return;
    progressStart();
    google.script.run
      .withSuccessHandler(function (data) {
        toast('🧹 Données effacées.');
        ALL_ROWS = hydrate((data && data.rows) || []);
        render();
        progressDone();
      })
      .withFailureHandler(function (err) { progressDone(); toast('⚠️ ' + err.message, true); })
      .resetData();
  }

  /* ----- Utilitaires ----- */
  function byId(id) { return document.getElementById(id); }

  /* ----- Indicateurs de chargement (barre en haut + loader central) -----
     Pas de progression réelle exposée par google.script.run : on simule une
     montée asymptotique vers ~92 %, puis on complète à 100 % à la fin. Un
     compteur gère les requêtes concurrentes (tout disparaît au dernier appel). */
  let _progPending = 0, _progTimer = null, _progVal = 0;
  function progressStart() {
    _progPending++;
    byId('loader').hidden = false;
    if (_progPending > 1) return;
    const fill = byId('topbarFill');
    _progVal = 8;
    fill.style.opacity = '1';
    fill.style.width = '8%';
    clearInterval(_progTimer);
    _progTimer = setInterval(function () {
      _progVal += (92 - _progVal) * 0.12;          // approche lente de 92 %
      fill.style.width = _progVal.toFixed(1) + '%';
    }, 180);
  }
  function progressDone() {
    _progPending = Math.max(0, _progPending - 1);
    if (_progPending > 0) return;
    byId('loader').hidden = true;
    const fill = byId('topbarFill');
    clearInterval(_progTimer);
    fill.style.width = '100%';
    setTimeout(function () {
      fill.style.opacity = '0';
      setTimeout(function () { fill.style.width = '0'; }, 250);
    }, 220);
  }

  let toastTimer = null;
  function toast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.toggle('err', !!isErr);
    t.hidden = false;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.hidden = true; }, 4200);
  }

  function formatMonth(ym) {
    const parts = String(ym).split('-');
    if (parts.length !== 2) return ym;
    const noms = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];
    const i = Number(parts[1]) - 1;
    return (noms[i] || parts[1]) + ' ' + parts[0];
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
</script>
