<script>
  const fmtEur = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
  const fmtEur2 = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' });
  const fmtInt = new Intl.NumberFormat('fr-FR');
  const PALETTE = ['#5b4bd6', '#16b8a6', '#f5a524', '#ef5da8', '#3aa0ff', '#9b8cff', '#27c498', '#ff7a59'];
  const charts = {};

  // Données brutes renvoyées par le serveur + état des filtres.
  let ALL_ROWS = [];
  const filters = { jour: 'all', moment: 'all' };

  /* ----- Démarrage ----- */
  document.addEventListener('DOMContentLoaded', function () {
    initImport();
    initFilters();
    document.getElementById('resetBtn').addEventListener('click', onReset);
    google.script.run.withSuccessHandler(function (url) {
      document.getElementById('ssLink').href = url;
    }).getStorageUrl();
    refresh();
  });

  /* ----- Import ----- */
  function initImport() {
    const zone = document.getElementById('dropzone');
    const input = document.getElementById('fileInput');

    zone.addEventListener('click', function () { input.click(); });
    zone.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); input.click(); }
    });
    input.addEventListener('change', function () { if (input.files[0]) handleFile(input.files[0]); input.value = ''; });

    ['dragenter', 'dragover'].forEach(function (ev) {
      zone.addEventListener(ev, function (e) { e.preventDefault(); zone.classList.add('drag'); });
    });
    ['dragleave', 'drop'].forEach(function (ev) {
      zone.addEventListener(ev, function (e) { e.preventDefault(); zone.classList.remove('drag'); });
    });
    zone.addEventListener('drop', function (e) {
      const f = e.dataTransfer.files[0];
      if (f) handleFile(f);
    });
  }

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = function (e) {
      showLoader(true);
      google.script.run
        .withSuccessHandler(function (res) {
          showLoader(false);
          let m = res.imported + ' ligne(s) importée(s)';
          if (res.duplicates) m += ' · ' + res.duplicates + ' doublon(s)';
          if (res.skipped) m += ' · ' + res.skipped + ' ignorée(s)';
          m += ' · total : ' + res.total;
          toast('✅ ' + m);
          refresh();
        })
        .withFailureHandler(function (err) { showLoader(false); toast('⚠️ ' + err.message, true); })
        .importCsv(e.target.result);
    };
    reader.onerror = function () { toast('⚠️ Lecture du fichier impossible.', true); };
    reader.readAsText(file);
  }

  /* ----- Filtres (segmented controls) ----- */
  function initFilters() {
    document.querySelectorAll('#filters .seg').forEach(function (seg) {
      const key = seg.dataset.filter;
      seg.addEventListener('click', function (e) {
        const btn = e.target.closest('.seg-btn');
        if (!btn) return;
        filters[key] = btn.dataset.value;
        seg.querySelectorAll('.seg-btn').forEach(function (b) { b.classList.toggle('is-active', b === btn); });
        render();
      });
    });
  }

  /* ----- Chargement des données ----- */
  function refresh() {
    showLoader(true);
    google.script.run
      .withSuccessHandler(function (data) {
        showLoader(false);
        ALL_ROWS = (data && data.rows) || [];
        render();
      })
      .withFailureHandler(function (err) { showLoader(false); toast('⚠️ ' + err.message, true); })
      .getRows();
  }

  /* ----- Filtrage ----- */
  function matchJour(r)   { return filters.jour === 'all' || (filters.jour === 'dim' ? r.dim : !r.dim); }
  function matchMoment(r) { return filters.moment === 'all' || (filters.moment === 'matin' ? r.matin : !r.matin); }
  function filtered()     { return ALL_ROWS.filter(function (r) { return matchJour(r) && matchMoment(r); }); }
  // Lignes filtrées sur le jour seulement : base des tableaux qui ventilent eux-mêmes matin/soir.
  function filteredJour() { return ALL_ROWS.filter(matchJour); }

  /* ----- Rendu global ----- */
  function render() {
    const rows = filtered();
    renderKpis(rows);
    renderMonthChart(rows);
    renderMomentChart(filteredJour());
    renderBornes(filteredJour());
    renderQuetes(rows);
  }

  function renderKpis(rows) {
    let total = 0;
    const bornes = {};
    rows.forEach(function (r) {
      total += r.net;
      if (r.projet) bornes[r.projet] = true;
    });
    const count = rows.length;
    document.getElementById('kpiTotal').textContent = fmtEur.format(total);
    document.getElementById('kpiCount').textContent = fmtInt.format(count);
    document.getElementById('kpiAvg').textContent = fmtEur2.format(count ? total / count : 0);
    document.getElementById('kpiBornes').textContent = fmtInt.format(Object.keys(bornes).length);
  }

  /* ----- Évolution mensuelle ----- */
  function renderMonthChart(rows) {
    const mois = {};
    rows.forEach(r => {
      if (r.mois) mois[r.mois] = (mois[r.mois] || 0) + r.net;
    });
    const labels = Object.keys(mois).sort();
    lineChart('chartMonth', labels.map(formatMonth), labels.map(function (k) { return mois[k]; }));
  }

  /* ----- Répartition matin / soir (sur lignes filtrées par jour) ----- */
  function renderMomentChart(rows) {
    let matin = 0, soir = 0;
    rows.forEach(function (r) { if (r.matin) matin += r.net; else soir += r.net; });
    doughnutChart('chartMoment', ['Matin', 'Soir'], [matin, soir]);
  }

  /* ----- Bornes (par Project Name, ventilation matin/soir) ----- */
  function renderBornes(rows) {
    const acc = {};
    rows.forEach(function (r) {
      const key = r.projet;
      if (!key) return;                          // « Bornes » = Project Name non vide
      const b = acc[key] || (acc[key] = { count: 0, matin: 0, soir: 0, total: 0 });
      b.count++;
      b.total += r.net;
      if (r.matin) b.matin += r.net; else b.soir += r.net;
    });
    const list = Object.keys(acc).map(function (k) { return Object.assign({ projet: k }, acc[k]); })
      .sort(function (a, b) { return b.total - a.total; });

    const body = document.getElementById('bornesBody');
    if (!list.length) {
      body.innerHTML = '<tr><td colspan="5" class="empty">Aucune borne pour ce filtre.</td></tr>';
      return;
    }
    let html = list.map(function (b) {
      return '<tr><td>' + esc(b.projet) + '</td><td class="num">' + fmtInt.format(b.count) +
        '</td><td class="num">' + fmtEur2.format(b.matin) + '</td><td class="num">' + fmtEur2.format(b.soir) +
        '</td><td class="num strong">' + fmtEur2.format(b.total) + '</td></tr>';
    }).join('');
    const tot = list.reduce(function (a, b) {
      a.count += b.count; a.matin += b.matin; a.soir += b.soir; a.total += b.total; return a;
    }, { count: 0, matin: 0, soir: 0, total: 0 });
    html += '<tr class="row-total"><td>Total</td><td class="num">' + fmtInt.format(tot.count) +
      '</td><td class="num">' + fmtEur2.format(tot.matin) + '</td><td class="num">' + fmtEur2.format(tot.soir) +
      '</td><td class="num strong">' + fmtEur2.format(tot.total) + '</td></tr>';
    body.innerHTML = html;
  }

  /* ----- Quêtes : tableau croisé Célébration × Lieu (total net) ----- */
  function renderQuetes(rows) {
    const cells = {};                            // cells[celebration][location] = net
    const celebs = {}, locs = {};
    rows.forEach(function (r) {
      const l = String(r.location || '').trim();
      if (!l) return;                            // Quêtes = Location non vide
      const c = r.celebration || '—';
      celebs[c] = true; locs[l] = true;
      (cells[c] || (cells[c] = {}));
      cells[c][l] = (cells[c][l] || 0) + r.net;
    });
    const celebList = Object.keys(celebs).sort();
    const locList = Object.keys(locs).sort();

    const table = document.getElementById('quetesTable');
    const head = table.querySelector('thead');
    const body = document.getElementById('quetesBody');

    if (!celebList.length || !locList.length) {
      head.innerHTML = '<tr><th>Célébration ＼ Lieu</th></tr>';
      body.innerHTML = '<tr><td class="empty">Aucune quête pour ce filtre.</td></tr>';
      return;
    }

    head.innerHTML = '<tr><th>Célébration ＼ Lieu</th>' +
      locList.map(function (l) { return '<th class="num">' + esc(l) + '</th>'; }).join('') +
      '<th class="num strong">Total</th></tr>';

    const colTot = {};
    let grand = 0;
    const rowsHtml = celebList.map(function (c) {
      let rowTot = 0;
      const tds = locList.map(function (l) {
        const v = (cells[c] && cells[c][l]) || 0;
        rowTot += v; colTot[l] = (colTot[l] || 0) + v;
        return '<td class="num">' + (v ? fmtEur2.format(v) : '·') + '</td>';
      }).join('');
      grand += rowTot;
      return '<tr><th class="row-head">' + esc(c) + '</th>' + tds +
        '<td class="num strong">' + fmtEur2.format(rowTot) + '</td></tr>';
    }).join('');

    const totalRow = '<tr class="row-total"><th class="row-head">Total</th>' +
      locList.map(function (l) { return '<td class="num">' + fmtEur2.format(colTot[l] || 0) + '</td>'; }).join('') +
      '<td class="num strong">' + fmtEur2.format(grand) + '</td></tr>';

    body.innerHTML = rowsHtml + totalRow;
  }

  /* ----- Graphiques (Chart.js) ----- */
  function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

  function lineChart(id, labels, values) {
    destroyChart(id);
    charts[id] = new Chart(byId(id), {
      type: 'line',
      data: { labels: labels, datasets: [{ data: values, borderColor: PALETTE[0],
        backgroundColor: 'rgba(91,75,214,.12)', fill: true, tension: .3, pointRadius: 3 }] },
      options: baseOpts(false, true)
    });
  }

  function doughnutChart(id, labels, values) {
    destroyChart(id);
    charts[id] = new Chart(byId(id), {
      type: 'doughnut',
      data: { labels: labels, datasets: [{ data: values, backgroundColor: PALETTE, borderWidth: 0 }] },
      options: baseOpts(true, false)
    });
  }

  function baseOpts(showLegend, eurAxis) {
    const opts = {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: showLegend, position: 'bottom' },
        tooltip: { callbacks: { label: function (c) {
          const v = c.parsed.y != null ? c.parsed.y : (c.parsed.x != null ? c.parsed.x : c.parsed);
          return ' ' + fmtEur2.format(v);
        } } }
      }
    };
    if (eurAxis) {
      // Seul l'axe des valeurs (y) est en euros ; l'axe x reste catégoriel (les mois).
      opts.scales = { y: { ticks: { callback: tickEur } } };
    }
    return opts;
  }
  function tickEur(v) { return (typeof v === 'number') ? fmtEur.format(v) : v; }

  /* ----- Effacer ----- */
  function onReset() {
    if (!confirm('Effacer toutes les données importées ? Cette action est irréversible.')) return;
    showLoader(true);
    google.script.run
      .withSuccessHandler(function (data) {
        showLoader(false); toast('🧹 Données effacées.');
        ALL_ROWS = (data && data.rows) || [];
        render();
      })
      .withFailureHandler(function (err) { showLoader(false); toast('⚠️ ' + err.message, true); })
      .resetData();
  }

  /* ----- Utilitaires ----- */
  function byId(id) { return document.getElementById(id); }
  function showLoader(v) { document.getElementById('loader').hidden = !v; }

  let toastTimer = null;
  function toast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.toggle('err', !!isErr);
    t.hidden = false;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.hidden = true; }, 4200);
  }

  function formatMonth(ym) {
    const parts = String(ym).split('-');
    if (parts.length !== 2) return ym;
    const noms = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];
    const i = Number(parts[1]) - 1;
    return (noms[i] || parts[1]) + ' ' + parts[0];
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
</script>
